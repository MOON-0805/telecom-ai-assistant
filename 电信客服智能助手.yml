          当前会话状态：

          - 上一轮意图：{{#conversation.collected_intent#}}

          - 上一轮子意图：{{#conversation.collected_sub_intent#}}


          - faq：用户询问「如何做某事」「是什么」「为什么」「多少钱」等知识性问题，只需要回答方法或定义，不需要替用户执行操作

          - flow：用户要求「帮我做」「办理」「查询我的XXX」「提交XXX」「报修」「投诉」「转人工」「人工客服」等需要调用系统接口、查询个人数据、执行具体动作的请求。**也包括用户直接提供手机号、地址等个人信息，以及用户说「办理XXX套餐」「办套餐」「我要办XXX」**。**也包括用户直接说套餐名称（如「129套餐」「59元畅享套餐」）。特别规则：如果上一轮意图是
          business_handle（办理业务），当前用户输入是套餐名称或编号，必须归类为 flow**

          - unknown：无法判断意图、与电信业务完全无关、无效输入、闲聊

          - human：用户要求转人工服务，如「转人工」「人工客服」「我要人工」「人工服务」等


          用户问题：{{#sys.query#}}


          只输出一个词：faq 或 flow 或 human 或 unknown'
