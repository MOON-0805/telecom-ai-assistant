            金额：{数字金额，没有则写无}\n套餐：{套餐名称，没有则写无}\n\n规则：\n- 意图判断：查话费/查余额/查流量 → balance_query；报修\
            \ → fault_report；办理业务 → business_handle；转人工 → human\n- 子意图判断（仅当意图为 business_handle\
            \ 时）：\n  * 充话费/充值 → recharge\n  * 改套餐/换套餐/变更套餐 → change_plan\n  * 办宽带/新装宽带\
            \ → new_broadband\n  * 其他 → other\n- 手机号：11位数字，以1开头\n- 地址：包含省/市/区/街道/路/号/院/小区等关键词\n\
            - 金额：数字，可能带「元」字\n\n【重要】优先级规则（从高到低）：\n\n1. 【最高优先级】如果用户输入是11位数字且以1开头，必须提取为「手机号」，绝对不能提取为「套餐」或「金额」\n\
            \n2. 如果用户输入中包含「套餐」「档」「畅享」等字样，必须提取到「套餐」字段，不要提取到「金额」\n\n3. 如果上一轮子意图是 change_plan（改套餐）：\n\
            \   a. 用户输入包含「元」但不包含「套餐」→ 提取为「套餐」（用户可能省略了「套餐」二字）\n   b. 用户输入是1-4位数字（如1、129）→\
            \ 提取为「套餐」（套餐编号或档位）\n\n4. 如果上一轮子意图是 recharge（充话费）：\n   a. 用户输入包含「元」→ 提取为「金额」\n\
            \   b. 用户输入是数字 → 提取为「金额」\n\n5. 如果用户输入中包含「元」「块」「钱」但不匹配上述条件，提取为「金额」\n\n\
            6. 其他情况：数字 → 金额；文字 → 地址或意图判断\n\n示例：\n- 用户输入「129元套餐」→ 套餐：129元套餐，金额：无\n\
            - 用户输入「129元」→ 上一轮 change_plan → 套餐：129元套餐，金额：无\n- 用户输入「129」→ 上一轮 change_plan\
            \ → 套餐：129元套餐，金额：无\n- 用户输入「1」→ 上一轮 change_plan → 套餐：1，金额：无\n- 用户输入「50元」→\
            \ 上一轮 recharge → 金额：50，套餐：无\n- 用户输入「50」→ 上一轮 recharge → 金额：50，套餐：无\n-\
            \ 用户输入「13812345678」→ 手机号：13812345678，套餐：无，金额：无\n\n只输出上面的格式，不要输出其他内容。"
