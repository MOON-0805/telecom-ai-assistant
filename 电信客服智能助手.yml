          \   intent = \"other\"\n    sub_intent = \"other\"\n    phone = None\n \
          \   address = None\n    amount = None\n    plan = None\n    \n    for line\
          \ in llm_output.strip().split('\\n'):\n        line = line.strip()\n   \
          \     \n        if line.startswith('意图：'):\n            intent_line = line[3:].strip()\n\
          \            if 'balance' in intent_line:\n                intent = 'balance_query'\n\
          \            elif 'fault' in intent_line:\n                intent = 'fault_report'\n\
          \            elif 'business' in intent_line:\n                intent = 'business_handle'\n\
          \            elif 'human' in intent_line:\n                intent = 'human'\n\
          \        \n        elif line.startswith('子意图：'):\n            sub_line =\
          \ line[4:].strip()\n            if sub_line == 'recharge':\n           \
          \     sub_intent = 'recharge'\n            elif sub_line == 'change_plan':\n\
          \                sub_intent = 'change_plan'\n            elif sub_line ==\
          \ 'new_broadband':\n                sub_intent = 'new_broadband'\n     \
          \   \n        elif line.startswith('手机号：'):\n            phone_line = line[4:].strip()\n\
          \            if phone_line != '无':\n                phone = phone_line\n\
          \        \n        elif line.startswith('地址：'):\n            address_line\
          \ = line[3:].strip()\n            if address_line != '无':\n            \
          \    address = address_line\n        \n        elif line.startswith('金额：'):\n\
          \            amount_line = line[3:].strip()\n            if amount_line\
          \ != '无' and amount_line:\n                amount = amount_line\n      \
          \  \n        elif line.startswith('套餐：'):\n            plan_line = line[3:].strip()\n\
          \            if plan_line != '无':\n                plan = plan_line\n  \
          \  \n    # 合并历史信息\n    final_intent = intent if intent != \"other\" else\
          \ collected_intent\n    final_sub_intent = sub_intent if sub_intent != \"\
          other\" else collected_sub_intent\n    final_phone = phone if phone else\
          \ collected_phone\n    final_address = address if address else collected_address\n\
          \    final_amount = amount if amount else collected_amount\n    final_plan\
          \ = plan if plan else collected_plan\n    \n    # 套餐编号映射（用户可能回复1、2、3、4）\n\
          \    plan_mapping = {\n        \"1\": \"129元套餐\",\n        \"2\": \"169元套餐\"\
          ,\n        \"3\": \"199元套餐\",\n        \"4\": \"299元套餐\",\n        \"129\"\
          : \"129元套餐\",\n        \"169\": \"169元套餐\",\n        \"199\": \"199元套餐\"\
          ,\n        \"299\": \"299元套餐\"\n    }\n    \n    if final_plan in plan_mapping:\n\
          \        final_plan = plan_mapping[final_plan]\n    \n    # 收集缺少的信息\n  \
          \  missing_items = []\n    \n    if final_intent == 'balance_query':\n \
          \       if not final_phone:\n            missing_items.append(\"手机号\")\n\
          \    \n    elif final_intent == 'fault_report':\n        if not final_address:\n\
          \            missing_items.append(\"地址\")\n    \n    elif final_intent ==\
          \ 'business_handle':\n        if final_sub_intent == 'recharge':\n     \
          \       if not final_phone:\n                missing_items.append(\"手机号\"\
          )\n            if not final_amount:\n                missing_items.append(\"\
          金额\")\n        elif final_sub_intent == 'change_plan':\n            if not\
          \ final_phone:\n                missing_items.append(\"手机号\")\n        \
          \    elif not final_plan:\n                missing_items.append(\"套餐选择\"\
          )\n        elif final_sub_intent == 'new_broadband':\n            if not\
          \ final_address:\n                missing_items.append(\"地址\")\n       \
          \ else:\n            missing_items.append(\"具体业务类型（充话费/改套餐/办宽带）\")\n   \
          \ \n    elif final_intent == 'human':\n        pass\n    \n    else:\n \
          \       missing_items.append(\"意图\")\n    \n    is_complete = len(missing_items)\
          \ == 0\n    missing_info = \"、\".join(missing_items) if missing_items else\
          \ \"\"\n    \n    return {\n        \"intent\": final_intent,\n        \"\
          sub_intent\": final_sub_intent,\n        \"phone\": final_phone,\n     \
          \   \"address\": final_address,\n        \"amount\": final_amount,\n   \
          \     \"selected_plan\": final_plan,\n        \"is_complete\": is_complete,\n\
